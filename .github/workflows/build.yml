name: Build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        include:
          - java: '21'
            profile: paper-1.21
          - java: '25'
            profile: paper-26
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      - name: Verify ${{ matrix.profile }}
        run: mvn --batch-mode --no-transfer-progress clean verify -P${{ matrix.profile }}
