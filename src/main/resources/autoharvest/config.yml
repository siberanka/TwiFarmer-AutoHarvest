# Farmer AutoHarvest module configuration
# Invalid known values are backed up and repaired automatically at startup/reload.

config-version: 12

# Enables the module and its Farmer GUI entry.
status: false

# Requires a piston above crops before they can be harvested.
requirePiston: false

# Only used when requirePiston is true. Includes horizontal piston checks.
checkAllDirections: false

# Allows harvesting in allowed worlds without a Farmer-backed region.
withoutFarmer: false

# Prevents a Farmer harvest when its relevant stock is full.
checkStock: true

# Initial AutoHarvest state for newly created Farmers.
defaultStatus: false

# Permission required to toggle AutoHarvest in the Farmer GUI.
customPerm: "farmer.autoharvest"

# Base item names handled by AutoHarvest.
items:
  - "WHEAT"
  - "CARROT"
  - "POTATO"
  - "PUMPKIN"

# Harvests upward-growing columns as one bounded job while preserving the base.
# Add or remove each supported crop independently: SUGAR_CANE, CACTUS, BAMBOO, KELP.
stacked-crops:
  enable: true
  items:
    - "SUGAR_CANE"
    - "CACTUS"
    - "BAMBOO"
    - "KELP"
  # Rejects taller columns without partially breaking them.
  max-segments-per-harvest: 32

# Checks this module's GitHub repository without blocking a server thread.
update-checker:
  enable: true
  # GitHub's latest stable release is checked at startup and at this interval.
  check-interval-hours: 6
  connect-timeout-seconds: 5
  request-timeout-seconds: 8

# Controls optional console diagnostics and the bounded module error file.
logging:
  # Shows queue saturation and periodic tracking/queue statistics in the console.
  debug: false
  # Minimum seconds between periodic debug statistics.
  debug-interval-seconds: 300
  error-file:
    # Maximum size of each error.log file before rotation.
    max-size-megabytes: 5
    # Number of rotated error.log files retained in addition to the active file.
    history-files: 2

# Optional production tuning. Configured child values are ignored while enable is false.
# Fixed conservative safety limits remain active even when this is false.
# Bukkit world access remains on Paper's owning region thread; no world mutation is async.
optimize-module:
  # Enables every configurable optimization value below.
  enable: false

  # Main harvest speed settings.
  harvest:
    # Hard harvest limit shared by every world and Folia region in one server tick.
    max-harvests-per-tick: 32
    # PLAYER, FARMER, LAND or CHUNK. FARMER gives every Farmer/island its own speed.
    separate-speed-for: "FARMER"
    # Optional steady delay between individual harvests in the selected group.
    delay-between-harvests:
      # Disabled by default so harvests do not receive an artificial per-block cooldown.
      enable: false
      # Number of ticks between harvests while this delay is enabled (20 ticks ~= 1 second).
      ticks: 2
    # Optional batch cooldown: harvest N crops, pause this group, then continue automatically.
    pause-after-batch:
      # Disabled by default; queue limits and server load protection remain active.
      enable: false
      # Number of queued harvest attempts allowed before each pause.
      after-harvests: 64
      # Duration of each pause in ticks (20 ticks ~= 1 second).
      ticks: 20

  # Controls when and how loaded chunks are searched for mature crops.
  crop-search:
    # EVENTS checks crop changes, TIMER checks known chunks periodically, BOTH enables both.
    mode: "EVENTS"
    triggers:
      # Tracks crops when their natural growth event reaches maturity.
      natural-growth: true
      # Tracks crops changed by bone meal or another fertilization event.
      bone-meal: true
      # Tracks supported crop blocks when a player places them.
      crop-placement: true
      # Scans every server chunk-load signal; keep disabled on very large servers.
      chunk-load: false
      # Scans the visible Farmer area immediately after a new Farmer is purchased.
      new-farmer: true
      # Scans nearby visible chunks when a player joins or the module reloads.
      player-join: true
      # Rechecks a chunk when it becomes visible to a player after movement.
      player-sees-chunk: true
      # Discovers every currently loaded chunk of a player's Farmer island on join/reload/purchase.
      entire-loaded-farmer-area: true
      # Rejects search triggers outside active Farmer areas unless withoutFarmer is true.
      farmer-areas-only: true
    scan-radius:
      # Visible chunk radius searched after a new Farmer is purchased.
      new-farmer-radius-chunks: 8
      # Visible chunk radius searched around players on join, reload and movement.
      player-radius-chunks: 3
    repeat-search:
      # Ticks between bounded checks of chunks already known to contain crops.
      every-ticks: 200
      # Number of known chunks returned to the scan queue each repeat.
      chunks-per-run: 2
    priority:
      # Gives chunks with more mature crops earlier scans without starving normal discovery.
      enable: true
      # Forces one normal discovery scan after this many prioritized crop scans.
      prioritized-scans-before-normal: 3
    # Advanced search limits below normally do not need changing.
    limits:
      # Maximum crop-bearing or loaded chunks remembered in memory.
      remembered-chunks: 8192
      # Maximum chunk scans kept active at the same time.
      scans-at-once: 1
      # Maximum region-thread chunk snapshots requested in one tick.
      snapshots-per-tick: 1
      # Maximum new chunk scans started per second.
      new-scans-per-second: 4
      # Maximum 4096-block chunk sections checked per second.
      sections-per-second: 32
      # Maximum block reads performed by one asynchronous task.
      blocks-per-async-task: 8192
      # Maximum unique chunk scan requests waiting in memory.
      waiting-scans: 4096
      # Maximum mature crops returned by one chunk scan.
      crops-found-per-scan: 512
      # Maximum discovered crops added to harvest queues in one region tick.
      crops-queued-per-tick: 32

  # Automatically reduces or pauses work when server/region tick health degrades.
  server-load-protection:
    # Enables load-aware scaling independently from optional harvest batch pauses.
    enable: true
    # Starts gradually reducing work above this rolling server MSPT.
    slow-down-at-mspt: 35.0
    # Temporarily stops new work above this rolling server MSPT.
    stop-at-mspt: 45.0
    # Resumes MSPT-paused work only after the server falls below this value.
    resume-below-mspt: 40.0
    # Lowest work percentage used while the server is slowing down.
    minimum-speed-percent: 10
    # Number of ticks between rolling MSPT evaluations.
    check-every-ticks: 20
    # Folia/Leaf safeguard threshold for an unusually late region callback.
    region-delay-limit-millis: 100
    # Number of ticks that the affected region remains cooled down after a late callback.
    region-recovery-ticks: 100

  # Low-level safety limits. Change these only after measuring production load.
  advanced:
    harvest-queue:
      # Delay before the first queued harvest in a newly active chunk.
      first-run-delay-ticks: 2
      # Minimum yield between later region runs from the same non-empty chunk queue.
      next-run-delay-ticks: 1
      # Maximum validated harvest attempts processed by one chunk/region run.
      harvests-per-run: 8
      # Maximum region runs submitted by the global dispatcher in one tick.
      region-runs-per-tick: 8
      # Maximum harvest jobs waiting in memory; overflow is searched again later.
      waiting-harvests: 8192
      # Merges repeated growth signals for a block while its harvest job is pending.
      merge-duplicate-blocks: true
