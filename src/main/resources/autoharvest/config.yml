# Farmer AutoHarvest module configuration
# Invalid known values are backed up and repaired automatically at startup/reload.

config-version: 3

# Enables the module and its Farmer GUI entry.
status: false

# Requires a piston above crops before they can be harvested.
requirePiston: false

# Only used when requirePiston is true. Includes horizontal piston checks.
checkAllDirections: false

# Allows harvesting in allowed worlds without a Farmer-backed region.
withoutFarmer: false

# Prevents a Farmer harvest when its relevant stock is full.
checkStock: true

# Initial AutoHarvest state for newly created Farmers.
defaultStatus: false

# Permission required to toggle AutoHarvest in the Farmer GUI.
customPerm: "farmer.autoharvest"

# Base item names handled by AutoHarvest.
items:
  - "WHEAT"
  - "CARROT"
  - "POTATO"
  - "PUMPKIN"

# Optional production tuning. Configured child values are ignored while enable is false.
# A fixed conservative tracking baseline remains active so mature crops are never event-only.
# Bukkit world access remains on Paper's owning region thread; no world mutation is async.
optimize-module:
  enable: false
  queue:
    # Delay for the first queued harvest after a crop matures.
    initial-delay-ticks: 2
    # Delay between later batches from the same chunk queue.
    continuation-delay-ticks: 1
    # Maximum validated harvests processed in one region run.
    max-jobs-per-run: 32
    # Global in-memory queue bound. Overflow safely falls back to one normal region task.
    max-pending-jobs: 4096
    # Merges repeated growth events for the same block while a job is pending.
    coalesce-duplicates: true
  tracking:
    # Rescan interval for chunks known to contain configured crops.
    reconcile-interval-ticks: 100
    # Active crop chunks added back to the scan queue per interval.
    max-chunks-per-cycle: 2
    # Memory bound for chunks known to contain configured crops.
    max-tracked-chunks: 8192
    # Maximum snapshot analyses running at the same time.
    max-concurrent-scans: 2
    # Bound for coalesced chunk scan requests.
    max-pending-scans: 4096
    # Mature crops submitted from one snapshot; later scans collect the rest.
    max-candidates-per-scan: 512
    # Loaded chunk radius reconciled immediately after a Farmer is purchased.
    purchase-radius-chunks: 8
    # Loaded chunk radius reconciled for online players after enable/reload.
    bootstrap-radius-chunks: 3
